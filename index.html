<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1>RECIPIES</h1>
            <form>
                <input type="text" placeholder="Search for recipies..." class="searchbox">
                <button type="submit" class="searchbutton">Search</button>
            </form>
        </nav>
    </header>

    <main>
        <section>
            <div class="recipe-container">
                <h2>Search Your Favorite Recipe...</h2>
            </div>
            <div class="popup">
                <button type="button" class="recipe-close">X</button>
                <div class="recipe-details"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
